<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIKYATH 2K25 - Register</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, rgba(255, 111, 97, 0.8), rgba(255, 204, 0, 0.8), rgba(106, 27, 154, 0.8), rgba(0, 188, 212, 0.8), rgba(76, 175, 80, 0.8)), 
                        url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #ff6f61;
        }

        header h1 {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6f61, #ffcc00, #6a1b9a, #00bcd4, #76ff03);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav ul li {
            margin: 5px 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }

        nav ul li:hover {
            background: #ffcc00;
        }

        nav ul li:hover a {
            color: #000;
        }

        .registration-form {
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: bold;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .form-group button {
            background: #ff6f61;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1em;
            width: 100%;
        }

        .form-group button:hover {
            background: #e64a45;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(51, 51, 51, 0.8);
            color: white;
            width: 100%;
            border-top: 3px solid #ff6f61;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            nav ul {
                flex-direction: column;
                align-items: center;
            }
            .registration-form {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>AIKYATH 2K25 - Register</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="registration-form">
        <h2>Registration Form</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="event">Select Event:</label>
                <select id="event" name="event" required>
                    <option value="">Choose an event</option>
                    <option value="dance">Dance Competition</option>
                    <option value="singing">Singing Competition</option>
                    <option value="tech-quiz">Tech Quiz</option>
                    <option value="treasure-hunt">Treasure Hunt</option>
                    <option value="debate">Debate Competition</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit">Register</button>
            </div>
        </form>
    </section>

    <footer>
        <p>&copy; 2025 AIKYATH 2K25. All rights reserved.</p>
    </footer>
</body>
</html>
